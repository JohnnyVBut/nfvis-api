{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">
          <i class="bi bi-hdd-network me-2 text-primary"></i>Connect to NFVIS
        </h4>

        {% if error %}
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Host IP</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-hdd"></i></span>
              <input type="text" name="ip" class="form-control"
                     placeholder="172.30.200.7" required autofocus>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control"
                     placeholder="admin" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Connect
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
