<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFVIS Manager{% if title %} — {{ title }}{% endif %}</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-hdd-network me-2"></i>NFVIS Manager
    </span>
    {% if hostname %}
    <span class="navbar-text text-secondary me-3">
      <i class="bi bi-plug-fill text-success me-1"></i>{{ hostname }}
    </span>
    {% endif %}
    {% if request.endpoint not in ('login',) %}
    <div class="d-flex gap-2">
      <a href="{{ url_for('dashboard') }}"
         class="btn btn-sm {% if request.endpoint == 'dashboard' %}btn-primary{% else %}btn-outline-light{% endif %}">
        <i class="bi bi-speedometer2 me-1"></i>Dashboard
      </a>
      <a href="{{ url_for('config') }}"
         class="btn btn-sm {% if request.endpoint == 'config' %}btn-primary{% else %}btn-outline-light{% endif %}">
        <i class="bi bi-gear me-1"></i>Configuration
      </a>
      <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </a>
    </div>
    {% endif %}
  </div>
</nav>

<div class="container-fluid px-4">
  {% block content %}{% endblock %}
</div>

<!-- ── Toast container ───────────────────────────────────────────── -->
<div id="toast-container"
     class="toast-container position-fixed bottom-0 end-0 p-3"
     style="z-index: 9999;"></div>

<!-- ── Delete Image modal ────────────────────────────────────────── -->
<div class="modal fade" id="deleteImageModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title text-danger">
          <i class="bi bi-trash me-2"></i>Delete Image
        </h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small">
        Delete image <strong id="deleteImageNameDisplay"></strong>?
        <br><span class="text-secondary">This cannot be undone.</span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary"
                data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="confirmDeleteBtn"
                class="btn btn-sm btn-danger"
                hx-delete=""
                hx-target="#toast-container"
                hx-swap="beforeend"
                data-bs-dismiss="modal">
          <i class="bi bi-trash me-1"></i>Delete
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Add Image modal ───────────────────────────────────────────── -->
<div class="modal fade" id="addImageModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title text-success">
          <i class="bi bi-cloud-download me-2"></i>Register VNF Image
        </h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="addImageForm"
            hx-post="{{ url_for('dashboard_image_register') }}"
            hx-target="#deploy-status-area"
            hx-swap="innerHTML">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Image Name</label>
            <input type="text" class="form-control form-control-sm"
                   name="name" required
                   placeholder="e.g. csr1000v-17.3.5">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Source URL</label>
            <input type="url" class="form-control form-control-sm"
                   name="url" required
                   placeholder="http://fileserver/images/image.tar.gz">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Datastore</label>
            <input type="text" class="form-control form-control-sm"
                   name="datastore" required
                   placeholder="e.g. datastore2">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-sm btn-secondary"
                  data-bs-dismiss="modal">Cancel</button>
          <button type="submit" id="addImageSubmitBtn" class="btn btn-sm btn-success">
            <i class="bi bi-cloud-download me-1"></i>Register
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── VM Action modal ───────────────────────────────────────────── -->
<div class="modal fade" id="vmActionModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="vmActionModalTitle"></h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small">
        <span id="vmActionModalBody"></span>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary"
                data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="confirmVmActionBtn"
                class="btn btn-sm"
                hx-post=""
                hx-target="#toast-container"
                hx-swap="beforeend"
                data-bs-dismiss="modal">Confirm</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Edit VM modal ──────────────────────────────────────────────── -->
<div class="modal fade" id="editVmModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="editVmModalTitle">Edit VM</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="editVmModalBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.js"></script>

<script>
// Auto-show Bootstrap toasts inserted by HTMX
document.body.addEventListener('htmx:afterSwap', function (e) {
  e.detail.target.querySelectorAll('.toast').forEach(function (el) {
    new bootstrap.Toast(el, { delay: 4000 }).show();
  });
});

// Delete modal: set image name + hx-delete URL
document.getElementById('deleteImageModal').addEventListener('show.bs.modal', function (e) {
  var name = e.relatedTarget && e.relatedTarget.getAttribute('data-image-name');
  if (!name) return;
  document.getElementById('deleteImageNameDisplay').textContent = name;
  var btn = document.getElementById('confirmDeleteBtn');
  btn.setAttribute('hx-delete', '/dashboard/images/' + encodeURIComponent(name));
  htmx.process(btn);
});

// Close modal immediately when Register is submitted
document.getElementById('addImageForm').addEventListener('submit', function () {
  var modal = bootstrap.Modal.getInstance(document.getElementById('addImageModal'));
  if (modal) modal.hide();
});

// Reset form when modal is fully hidden
document.getElementById('addImageModal').addEventListener('hidden.bs.modal', function () {
  document.getElementById('addImageForm').reset();
});

// After any VM action/edit: schedule two delayed refreshes as safety net
document.body.addEventListener('vmEdited', function () {
  [4000, 9000].forEach(function (delay) {
    setTimeout(function () {
      document.body.dispatchEvent(new Event('refreshDeployments'));
    }, delay);
  });
});

// Edit VM modal: load form via HTMX when shown
document.getElementById('editVmModal').addEventListener('show.bs.modal', function (e) {
  var name = e.relatedTarget && e.relatedTarget.getAttribute('data-vm-name');
  if (!name) return;
  document.getElementById('editVmModalTitle').textContent = 'Edit VM: ' + name;
  document.getElementById('editVmModalBody').innerHTML =
    '<div class="d-flex justify-content-center p-4"><div class="spinner-border text-secondary"></div></div>';
  htmx.ajax('GET', '/dashboard/deployments/' + encodeURIComponent(name) + '/edit',
            {target: '#editVmModalBody', swap: 'innerHTML'});
});

// Edit VM modal: close on submit and schedule deployment refreshes via JS.
// We do NOT rely on HX-Trigger propagation from the form because the modal
// is hidden before the server response arrives, making event bubbling
// unreliable. Instead we dispatch refreshDeployments directly on body.
document.getElementById('editVmModal').addEventListener('submit', function () {
  var modal = bootstrap.Modal.getInstance(this);
  if (modal) modal.hide();
  [2000, 6000, 12000, 20000, 35000].forEach(function (delay) {
    setTimeout(function () {
      document.body.dispatchEvent(new CustomEvent('refreshDeployments', {bubbles: true}));
    }, delay);
  });
});

// VM Action modal: set title, body, button style and hx-post URL
document.getElementById('vmActionModal').addEventListener('show.bs.modal', function (e) {
  var btn = e.relatedTarget;
  if (!btn) return;
  var vm     = btn.getAttribute('data-vm-name');
  var action = btn.getAttribute('data-vm-action');
  var titles  = { START: 'Start VM', STOP: 'Stop VM', REBOOT: 'Reboot VM' };
  var bodies  = {
    START:  'Start VM <strong>' + vm + '</strong>?',
    STOP:   'Stop VM <strong>' + vm + '</strong>?',
    REBOOT: 'Reboot VM <strong>' + vm + '</strong>?'
  };
  var btnClasses = { START: 'btn-success', STOP: 'btn-danger', REBOOT: 'btn-warning' };
  document.getElementById('vmActionModalTitle').textContent = titles[action] || action;
  document.getElementById('vmActionModalBody').innerHTML   = bodies[action]  || vm;
  var confirm = document.getElementById('confirmVmActionBtn');
  confirm.className = 'btn btn-sm ' + (btnClasses[action] || 'btn-secondary');
  confirm.textContent = action.charAt(0) + action.slice(1).toLowerCase();
  confirm.setAttribute('hx-post', '/dashboard/deployments/' + encodeURIComponent(vm) + '/action/' + action);
  htmx.process(confirm);
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
