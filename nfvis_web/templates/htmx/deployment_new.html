<form hx-post="{{ url_for('dashboard_deployment_create') }}"
      hx-target="#toast-container"
      hx-swap="beforeend">

  <div class="row g-3">

    <!-- VM Name -->
    <div class="col-12">
      <label class="form-label fw-semibold small">
        VM Name <span class="text-danger">*</span>
      </label>
      <input type="text" class="form-control form-control-sm"
             name="name" required placeholder="e.g. my-router">
    </div>

    <!-- Image -->
    <div class="col-12">
      <label class="form-label fw-semibold small">
        Image <span class="text-danger">*</span>
      </label>
      <select name="image" id="newVmImage" class="form-select form-select-sm" required
              hx-get="{{ url_for('htmx_deployment_new_dynamic') }}"
              hx-target="#vm-dynamic-section"
              hx-swap="innerHTML"
              hx-trigger="change">
        <option value="">— select image —</option>
        {% for img in images %}
        <option value="{{ img.name }}">{{ img.name }}</option>
        {% endfor %}
      </select>
    </div>

  </div>

  <!-- Dynamic section: flavor + datastore + custom properties -->
  <div id="vm-dynamic-section" class="mt-3">
    <p class="text-secondary small mb-0">
      <i class="bi bi-arrow-up me-1"></i>Select an image to load flavors and properties.
    </p>
  </div>

  <!-- NICs -->
  <div class="mt-3 mb-2">
    <label class="form-label fw-semibold small">Network Interfaces</label>
    <div id="new-nic-list"></div>
    <button type="button" class="btn btn-sm btn-outline-secondary mt-1"
            onclick="addNewNic()">
      <i class="bi bi-plus-lg me-1"></i>Add NIC
    </button>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-sm btn-secondary"
            data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-sm btn-success">
      <i class="bi bi-play-fill me-1"></i>Deploy
    </button>
  </div>

</form>

<script>
(function () {
  var _nets = {{ networks | tojson }};

  window.addNewNic = function (selected) {
    var list = document.getElementById('new-nic-list');
    var idx  = list.querySelectorAll('.nic-row').length;
    var opts = _nets.map(function (n) {
      return '<option value="' + n + '"' + (n === selected ? ' selected' : '') + '>' + n + '</option>';
    }).join('');
    var row = document.createElement('div');
    row.className = 'nic-row d-flex align-items-center gap-2 mb-2';
    row.innerHTML =
      '<span class="badge bg-secondary text-center" style="min-width:3.5rem">NIC ' + idx + '</span>' +
      '<select name="network[]" class="form-select form-select-sm">' + opts + '</select>' +
      '<button type="button" class="btn btn-sm btn-outline-danger py-0 px-1 flex-shrink-0"' +
      ' onclick="removeNewNic(this)" title="Remove NIC"><i class="bi bi-x-lg"></i></button>';
    list.appendChild(row);
    _renumberNew();
  };

  window.removeNewNic = function (btn) {
    btn.closest('.nic-row').remove();
    _renumberNew();
  };

  function _renumberNew() {
    document.querySelectorAll('#new-nic-list .nic-row').forEach(function (row, i) {
      row.querySelector('.badge').textContent = 'NIC ' + i;
    });
  }
})();
</script>
