<form hx-post="{{ url_for('dashboard_flavor_create') }}"
      hx-target="#toast-container"
      hx-swap="beforeend">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label fw-semibold small">Name <span class="text-danger">*</span></label>
      <input type="text" class="form-control form-control-sm"
             name="name" required placeholder="e.g. CSR-Small">
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">vCPU <span class="text-danger">*</span></label>
      <input type="number" class="form-control form-control-sm"
             name="vcpus" required min="1" placeholder="2">
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">RAM (MB) <span class="text-danger">*</span></label>
      <input type="number" class="form-control form-control-sm"
             name="memory_mb" required min="1" placeholder="4096">
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Root Disk (GB)</label>
      <input type="number" class="form-control form-control-sm"
             name="root_disk_gb" min="0" placeholder="e.g. 40">
    </div>
    <div class="col-6">
      <label class="form-label fw-semibold small">Source Image</label>
      <select name="source_image" class="form-select form-select-sm">
        <option value="">— none —</option>
        {% for img in images %}
        <option value="{{ img }}">{{ img }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12">
      <label class="form-label fw-semibold small">Description</label>
      <input type="text" class="form-control form-control-sm"
             name="description" placeholder="Optional">
    </div>
  </div>
  <div class="d-flex justify-content-end gap-2 mt-3">
    <button type="button" class="btn btn-sm btn-secondary"
            data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-sm btn-primary">
      <i class="bi bi-plus-lg me-1"></i>Create
    </button>
  </div>
</form>
