{% set cur_mode = port.get('mode', 'access') %}

<form hx-put="{{ url_for('dashboard_switchport_update', name=port_name) }}"
      hx-target="#toast-container"
      hx-swap="beforeend">

  <div class="modal-body">

    <div class="mb-3">
      <label class="form-label fw-semibold small">Interface</label>
      <input type="text" class="form-control form-control-sm bg-body-secondary"
             value="GigabitEthernet{{ port_name }}" readonly>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold small">Description</label>
      <input type="text" class="form-control form-control-sm"
             name="description" value="{{ port.get('description', '') }}"
             placeholder="optional">
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold small">Mode</label>
      <select class="form-select form-select-sm" name="mode" id="swpModeSelect"
              onchange="toggleSwpMode(this.value)">
        <option value="access"{% if cur_mode == 'access' %} selected{% endif %}>Access</option>
        <option value="trunk"{% if cur_mode == 'trunk' %} selected{% endif %}>Trunk</option>
      </select>
    </div>

    <div class="mb-3" id="swpAccessVlanRow"{% if cur_mode != 'access' %} style="display:none"{% endif %}>
      <label class="form-label fw-semibold small">Access VLAN</label>
      <input type="number" class="form-control form-control-sm"
             name="access_vlan" min="1" max="4094"
             value="{{ port.get('access_vlan', 1) }}">
    </div>

    <div class="mb-3" id="swpNativeVlanRow"{% if cur_mode != 'trunk' %} style="display:none"{% endif %}>
      <label class="form-label fw-semibold small">Native VLAN</label>
      <input type="number" class="form-control form-control-sm"
             name="native_vlan" min="1" max="4094"
             value="{{ port.get('native_vlan', 1) }}">
    </div>

    <div class="mb-3" id="swpAllowedVlansRow"{% if cur_mode != 'trunk' %} style="display:none"{% endif %}>
      <label class="form-label fw-semibold small">Allowed VLANs</label>
      <input type="text" class="form-control form-control-sm"
             name="allowed_vlans"
             value="{{ port.get('allowed_vlans', '') }}"
             placeholder="e.g. 10-20,30  or  all">
    </div>

    <div class="form-check mt-2">
      <input class="form-check-input" type="checkbox" id="swpShutdown"
             name="shutdown" value="1"{% if port.get('shutdown') %} checked{% endif %}>
      <label class="form-check-label small" for="swpShutdown">Admin shutdown</label>
    </div>

  </div><!-- /.modal-body -->

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-secondary"
            data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-sm btn-primary">
      <i class="bi bi-check-lg me-1"></i>Save
    </button>
  </div>

</form>

<script>
function toggleSwpMode(mode) {
  document.getElementById('swpAccessVlanRow').style.display  = (mode === 'access') ? '' : 'none';
  document.getElementById('swpNativeVlanRow').style.display  = (mode === 'trunk')  ? '' : 'none';
  document.getElementById('swpAllowedVlansRow').style.display = (mode === 'trunk') ? '' : 'none';
}
</script>
